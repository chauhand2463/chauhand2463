name: Generate Contribution Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours, at minute 0 — NOT every minute
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/generate-pacman.js"
      - ".github/workflows/animation.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate pacman SVGs (custom generator, not a stock action)
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GH_PAT }}   # classic PAT, scope: read:user
          OUT_DIR: dist
        run: node scripts/generate-pacman.js

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
